name: '[Deploy] Deploy Mobile Application'
run-name: >
  ${{ format('{0}Deploying Mobile to {1} — FE:{2}',
    github.event.client_payload.pr_number && format('{0} ', github.event.client_payload.pr_number) || '',
    github.event.client_payload.target_env || inputs.target_env,
    github.event.client_payload.fe_tag_name || inputs.fe_tag_name,
  ) }}  

on:
  repository_dispatch:
    types: 
      - Trigger-DeployMobile-Sync-Test

  workflow_dispatch:
    inputs:
      mobile_deploy:
        description: 'Deploy Mobile (iOS/Android)'
        required: true
        type: choice
        options:
          - android
          - ios
          - both
        default: android
      fe_tag_name:
        required: true
        description: 'Tag to deploy (Frontend)'
        type: string
        default: ''
      target_env:
        required: true
        description: 'Target Environment'
        type: choice
        options:
          - stage
          - prod
      run_smoke_test:
        description: 'Run Smoke Test (Mobile)'
        required: true
        type: boolean
        default: false

jobs:
  set_env:
    name: 'SetUp Environment'
    uses: nabarun-ngo/ngo-nabarun-templates/.github/workflows/Setup-Env.yml@main
    with:
      inputs: ${{ toJson(inputs) }}
      client_payload: ${{ toJson(github.event.client_payload) }}

  build_android:
    if: ${{ fromJson(needs.set_env.outputs.variables).mobile_deploy == 'android' || fromJson(needs.set_env.outputs.variables).mobile_deploy == 'both' }}
    needs: set_env
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: nabarun-ngo/ngo-nabarun-fe
          token: ${{ secrets.PAT }}
          ref: ${{ fromJson(needs.set_env.outputs.variables).fe_tag_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Angular Web App
        run: ${{ fromJson(needs.set_env.outputs.variables).target_env == 'prod' && 'npm run build' || 'npm run build:stage' }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '22'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK (Manual)
        id: sign_app
        shell: bash
        run: |
          # 1. Setup paths
          SDK_PATH=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          BUILD_TOOL_VERSION=$(ls "$SDK_PATH/build-tools/" | sort -V | tail -n 1)
          APKSIGNER="$SDK_PATH/build-tools/$BUILD_TOOL_VERSION/apksigner"
          ZIPALIGN="$SDK_PATH/build-tools/$BUILD_TOOL_VERSION/zipalign"
          
          echo "Using Build Tools Version: $BUILD_TOOL_VERSION"
          
          APK_DIR="android/app/build/outputs/apk/release"
          # Find the unsigned APK (usually app-release-unsigned.apk)
          UNSIGNED_APK=$(find $APK_DIR -name "*-unsigned.apk" | head -n 1)
          
          if [ -z "$UNSIGNED_APK" ]; then
            echo "Error: Could not find unsigned APK in $APK_DIR"
            ls -R $APK_DIR
            exit 1
          fi
          
          SIGNED_APK="$APK_DIR/app-release-signed.apk"
          
          # 2. Decode Keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          
          # 3. Zipalign
          echo "Aligning APK..."
          $ZIPALIGN -f -v 4 "$UNSIGNED_APK" "$SIGNED_APK"
          
          # 4. Sign
          echo "Signing APK..."
          $APKSIGNER sign --ks release.keystore \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$SIGNED_APK" \
            "$SIGNED_APK"
          
          # 5. Verify
          $APKSIGNER verify "$SIGNED_APK"
          
          # 6. Set output for Firebase distribution
          echo "signedReleaseFile=$SIGNED_APK" >> $GITHUB_OUTPUT
          
          # Cleanup
          rm release.keystore

      - name: Firebase App Distribution (Android)
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute ${{steps.sign_app.outputs.signedReleaseFile}} --app ${{ secrets.FIREBASE_ANDROID_APP_ID }} --groups "testers"
        env:
          GCP_SA_KEY: ${{ secrets.FB_SA_KEY }}

  build_ios:
    if: ${{ fromJson(needs.set_env.outputs.variables).mobile_deploy == 'ios' || fromJson(needs.set_env.outputs.variables).mobile_deploy == 'both' }}
    needs: set_env
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: nabarun-ngo/ngo-nabarun-fe
          token: ${{ secrets.PAT }}
          ref: ${{ fromJson(needs.set_env.outputs.variables).fe_tag_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Angular Web App
        run: ${{ fromJson(needs.set_env.outputs.variables).target_env == 'prod' && 'npm run build' || 'npm run build:stage' }}

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Import Certificates & Provisioning Profile
        run: |
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision

      - name: Build iOS Archive & IPA
        run: |
          npx cap build ios --ipa --p12-path=cert.p12 --p12-password=${{ secrets.IOS_P12_PASSWORD }} --provisioning-profile=profile.mobileprovision

      - name: Firebase App Distribution (iOS)
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute ios/App/build/outputs/ipa/*.ipa --app ${{ secrets.FIREBASE_IOS_APP_ID }} --groups "testers"
        env:
          GCP_SA_KEY: ${{ secrets.FB_SA_KEY }}

  # trigger_smoke_test could be added here if needed, exactly like in deploy-fe.yml
